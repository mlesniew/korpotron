name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv run pytest
        env:
          SECRET_KEY: ci-placeholder-not-used-in-production

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv run ruff check .

  docker-smoke:
    name: Docker Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build image
        run: docker build -t korpotron-smoke:ci .
      - name: Start container
        run: |
          docker run -d \
            -p 8080:8080 \
            -e SECRET_KEY=ci-placeholder-not-used-in-production \
            -e ALLOWED_HOSTS=localhost,127.0.0.1 \
            --name korpotron-smoke \
            korpotron-smoke:ci
      - name: Run migrations
        run: docker exec korpotron-smoke python manage.py migrate --noinput
      - name: Poll HTTP 200
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/ >/dev/null; then echo "up after ${i}s"; exit 0; fi
            sleep 1
          done
          echo "container did not serve HTTP 200 within 30s"; docker logs korpotron-smoke; exit 1
      - name: Teardown
        if: always()
        run: docker rm -f korpotron-smoke

  deploy:
    name: Deploy
    needs: [test, lint, docker-smoke]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/fix/flyctl-github-action')
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@1.5
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
