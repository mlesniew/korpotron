<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Korpotron — Log in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         oklch(11% 0.012 270);
      --surface:    oklch(16% 0.012 270);
      --border:     oklch(26% 0.012 270);
      --border-s:   oklch(32% 0.012 270);
      --text:       oklch(93% 0.005 80);
      --text-mid:   oklch(62% 0.007 270);
      --text-dim:   oklch(44% 0.007 270);
      --accent:     oklch(61% 0.16 40);
      --accent-h:   oklch(55% 0.16 40);
      --r:          7px;
      --r-lg:       11px;
      --r-xl:       15px;
      --shadow-md:  0 4px 24px rgba(0,0,0,.45), 0 2px 8px rgba(0,0,0,.3);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; }

    /* ── Subtle grid bg ──────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 20%, transparent 100%);
    }

    /* ── Nav ─────────────────────────────────── */
    .nav {
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 28px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      position: relative;
      z-index: 1;
    }
    .nav-brand {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12.5px;
      font-weight: 600;
      letter-spacing: .14em;
      color: var(--text);
    }
    .nav-brand sup { font-size: 8px; opacity: .4; letter-spacing: 0; vertical-align: super; }
    .nav-brand:hover { opacity: .8; }

    /* ── Page centre ─────────────────────────── */
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    /* ── Login card ──────────────────────────── */
    .login-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r-xl);
      box-shadow: var(--shadow-md);
      width: 100%;
      max-width: 360px;
    }

    .login-card-hdr {
      padding: 24px 26px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .login-card-title {
      font-size: 16px;
      font-weight: 700;
    }
    .login-card-sub {
      font-size: 12.5px;
      color: var(--text-dim);
    }

    .login-card-body {
      padding: 22px 26px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Error bar ───────────────────────────── */
    .err-bar {
      background: oklch(20% 0.04 22);
      border: 1px solid oklch(40% 0.12 22);
      color: oklch(75% 0.1 22);
      padding: 9px 13px;
      border-radius: var(--r);
      font-size: 12.5px;
    }

    /* ── Fields ──────────────────────────────── */
    .login-field { display: flex; flex-direction: column; gap: 5px; }
    .login-lbl   { font-size: 12.5px; font-weight: 600; }
    .login-input {
      width: 100%; padding: 10px 13px;
      border: 1.5px solid var(--border-s);
      border-radius: var(--r-lg);
      background: oklch(20% 0.01 270);
      color: var(--text);
      font-family: inherit; font-size: 14px;
      outline: none; transition: border-color .15s;
    }
    .login-input:focus { border-color: var(--accent); }
    .login-input::placeholder { color: var(--text-dim); }

    /* ── Submit ──────────────────────────────── */
    .btn-login {
      width: 100%; padding: 11px;
      border-radius: var(--r-xl);
      background: var(--accent); color: #fff; border: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13.5px; font-weight: 600; letter-spacing: .04em;
      transition: background .14s, transform .08s;
      box-shadow: 0 3px 14px oklch(61% 0.16 40 / .3);
    }
    .btn-login:hover  { background: var(--accent-h); }
    .btn-login:active { transform: translateY(1px); }

    /* ── Back link ───────────────────────────── */
    .back-link {
      display: block;
      text-align: center;
      margin-top: 18px;
      font-size: 12.5px;
      color: var(--text-dim);
      transition: color .13s;
    }
    .back-link:hover { color: var(--accent); }
  </style>
</head>
<body>

<!-- ── Nav ─────────────────────────────────────── -->
<nav class="nav">
  <a href="Korpotron Landing.html" class="nav-brand">KORPOTRON<sup>™</sup></a>
</nav>

<!-- ── Login card ──────────────────────────────── -->
<div class="center">
  <div class="login-card">

    <div class="login-card-hdr">
      <div class="login-card-title">Log in</div>
      <div class="login-card-sub">Enter your credentials to access Korpotron.</div>
    </div>

    <div class="login-card-body">

      <!-- Error bar — shown only when Django returns form errors -->
      <div class="err-bar" id="err-bar" style="display:none">
        Invalid username or password. Please try again.
      </div>

      <div class="login-field">
        <label class="login-lbl" for="l-user">Username</label>
        <input id="l-user" class="login-input" type="text"
          name="username" autocomplete="username" placeholder="j.smith">
      </div>

      <div class="login-field">
        <label class="login-lbl" for="l-pass">Password</label>
        <input id="l-pass" class="login-input" type="password"
          name="password" autocomplete="current-password" placeholder="••••••••">
      </div>

      <button class="btn-login" type="submit"
        onclick="document.getElementById('err-bar').style.display='block'">
        Log in
      </button>

    </div>
  </div>

  <a href="Korpotron Landing.html" class="back-link">← Back to home</a>
</div>

</body>
</html>
