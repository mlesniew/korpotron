{% extends "base.html" %}
{% block content %}
    <h1>
        {% if object %}
            Edit template
        {% else %}
            New template
        {% endif %}
    </h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'template-list' %}"
           class="btn btn-outline-secondary ms-2">Cancel</a>
    </form>
{% endblock %}
