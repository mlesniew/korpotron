{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1>Option Groups</h1>
  <a href="{% url 'option-group-create' %}" class="btn btn-primary">New option group</a>
</div>

{% if object_list %}
<table class="table">
  <thead>
    <tr>
      <th>Name</th>
      <th>Options</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {% for group in object_list %}
    <tr>
      <td>{{ group.name }}</td>
      <td>{{ group.options.count }}</td>
      <td class="text-end">
        <a href="{% url 'option-group-update' group.pk %}" class="btn btn-sm btn-outline-secondary">Edit</a>
        <a href="{% url 'option-group-delete' group.pk %}" class="btn btn-sm btn-outline-danger">Delete</a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<p class="text-muted">No option groups yet. <a href="{% url 'option-group-create' %}">Create one</a>.</p>
{% endif %}
{% endblock %}
